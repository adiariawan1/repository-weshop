<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - We-Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-green-100 to-green-200 min-h-screen flex items-center justify-center p-4">

<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
  <h2 class="text-3xl font-bold text-green-800 text-center mb-6">🔐 Login We-Shop</h2>
  <div class="space-y-4">
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
      <input id="username" class="w-full border rounded-xl p-3 focus:ring-2 focus:ring-green-500 outline-none" placeholder="Masukkan username">
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
      <input id="password" type="password" class="w-full border rounded-xl p-3 focus:ring-2 focus:ring-green-500 outline-none" placeholder="Masukkan password">
    </div>
    <button onclick="login()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition">
      Masuk
    </button>
    <p class="text-center text-xs text-gray-500 mt-2">
      Gunakan akun:<br>
      <b>seller</b> / <b>seller123</b> (Penjual)<br>
      <b>buyer</b> / <b>buyer123</b> (Pembeli)
    </p>
  </div>
</div>

<script src="app.js"></script>
<script>
  function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    const user = HARDCODED_USERS.find(u => u.username === username && u.password === password);
    if (!user) {
      alert('Username atau password salah!');
      return;
    }

    // Simpan user tanpa password
    const sessionUser = {
      username: user.username,
      role: user.role,
      email: user.email
    };
    saveCurrentUser(sessionUser);
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
