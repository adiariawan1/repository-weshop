<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We-Shop | Beranda</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04); }
  </style>
</head>
<body class="bg-gradient-to-br from-green-50 to-green-100 min-h-screen flex flex-col">

<nav class="bg-gradient-to-r from-green-600 to-green-700 text-white shadow-lg">
  <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
    <a href="index.html" class="text-2xl font-extrabold tracking-tight">WE-SHOP</a>
    <div class="flex space-x-4 items-center">
      <a href="index.html" class="hover:underline">Beranda</a>
      <a href="cart.html" class="hover:underline">Keranjang (<span id="cart-count">0</span>)</a>
      <div id="auth-menu"></div>
    </div>
  </div>
</nav>

<main class="flex-grow max-w-7xl mx-auto px-4 py-8 w-full">
  <h2 class="text-3xl font-bold text-green-800 mb-8 text-center">🛍️ Katalog Produk Terbaru</h2>
  <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
    <p class="col-span-full text-center text-gray-500">Memuat produk...</p>
  </div>
</main>

<footer class="bg-green-800 text-white text-center py-4 text-sm">
  &copy; 2026 We-Shop E-Commerce. All rights reserved.
</footer>

<script src="app.js"></script>
<script>
  async function loadProducts() {
    let products = [];
    try {
      const res = await fetch('data/products.json');
      if (!res.ok) throw new Error('Gagal fetch');
      products = await res.json();
    } catch (e) {
      // Fallback jika file JSON tidak ditemukan (misal dibuka langsung tanpa server)
      products = [
        { product_id: "p1", name: "Sepatu Sneakers Kasual", description: "Sepatu nyaman untuk sehari-hari", price: 250000, stock: 15 },
        { product_id: "p2", name: "Tas Ransel Premium", description: "Tas ransel anti air, cocok traveling", price: 180000, stock: 8 },
        { product_id: "p3", name: "Headphone Bluetooth", description: "Suara jernih dengan bass mantap", price: 320000, stock: 20 },
        { product_id: "p4", name: "Botol Minum Stainless", description: "Botol vacuum 500ml", price: 85000, stock: 30 },
        { product_id: "p5", name: "Kaos Katun Polos", description: "Bahan adem, tersedia berbagai ukuran", price: 75000, stock: 50 },
        { product_id: "p6", name: "Mouse Gaming RGB", description: "Resolusi tinggi, 7 tombol", price: 145000, stock: 12 }
      ];
    }
    // Gabung dengan produk custom seller
    const custom = getCustomProducts();
    const allProducts = [...products, ...custom];
    renderProducts(allProducts);
  }

  function renderProducts(products) {
    const grid = document.getElementById('product-grid');
    if (products.length === 0) {
      grid.innerHTML = '<p class="col-span-full text-gray-500 text-center py-10">Belum ada produk.</p>';
      return;
    }
    grid.innerHTML = products.map(p => `
      <div class="bg-white rounded-2xl shadow-md overflow-hidden card-hover transition duration-300 flex flex-col">
        <div class="h-40 bg-gradient-to-br from-green-200 to-green-100 flex items-center justify-center text-4xl">📦</div>
        <div class="p-5 flex flex-col flex-grow">
          <h3 class="font-bold text-lg text-gray-800 truncate">${p.name}</h3>
          <p class="text-sm text-gray-500 mb-2 line-clamp-2">${p.description || ''}</p>
          <div class="flex justify-between items-center mt-auto mb-3">
            <span class="text-green-700 font-bold text-xl">Rp ${p.price.toLocaleString('id-ID')}</span>
            <span class="text-xs text-gray-400">Stok: ${p.stock}</span>
          </div>
          <button onclick="addToCart('${p.product_id}', '${p.name.replace(/'/g, "\\'")}', ${p.price})" 
            class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-xl font-semibold transition">
            + Keranjang
          </button>
        </div>
      </div>
    `).join('');
  }

  function addToCart(id, name, price) {
    let cart = getCart();
    const found = cart.find(i => i.id === id);
    if (found) found.qty++;
    else cart.push({ id, name, price, qty: 1 });
    saveCart(cart);
    alert(`${name} ditambahkan ke keranjang!`);
  }

  document.addEventListener('DOMContentLoaded', loadProducts);
</script>
</body>
</html>
